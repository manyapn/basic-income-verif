<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Income Verification Tool</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell mx-auto d-flex align-items-center">
      <div class="container py-5">
        <header class="mx-auto mb-4 app-header">
          <h1 class="h2 fw-bold mb-2">Income Verification Tool</h1>
          <p class="lead text-secondary mb-0 fs-5">
            Upload a PDF income document to verify whether the identified income value is above $150,000.
          </p>
        </header>

        <section class="card app-card mx-auto shadow-sm" aria-labelledby="upload-title">
          <div class="card-body p-4 p-md-5">
            <h2 class="h5 fw-semibold mb-4" id="upload-title">Upload PDF</h2>

            <form>
              <div class="mb-4">
                <label for="pdf-file" class="form-label fw-medium">PDF document</label>
                <input
                  class="form-control form-control-lg"
                  id="pdf-file"
                  name="pdf-file"
                  type="file"
                  accept="application/pdf,.pdf"
                >
              </div>

              <div class="d-flex flex-column flex-sm-row gap-2">
                <button class="btn btn-primary btn-lg px-4" id="analyze-btn" type="button">
                  Analyze PDF
                </button>
                <button class="btn btn-outline-secondary btn-lg px-4" id="clear-btn" type="button">
                  Clear
                </button>
              </div>
            </form>

            <div class="mt-4 d-none" id="status-area">
              <div class="d-flex align-items-center gap-3 rounded-3 border bg-light p-3">
                <div>
                  <p class="fw-medium mb-0">Analysis status</p>
                  <p class="text-secondary small mb-0" id="status-text"></p>
                </div>
              </div>
            </div>

            <section class="result-panel mt-4 is-undetermined d-none" id="result-panel" aria-labelledby="result-title">
              <div class="d-flex flex-column flex-md-row align-items-md-start justify-content-between gap-3">
                <div>
                  <p class="text-uppercase fw-semibold small mb-2">Result</p>
                  <h2 class="h4 fw-bold mb-2" id="result-title">Awaiting PDF</h2>
                  <p class="mb-0" id="result-body">Upload and analyze a PDF to see the result.</p>
                </div>
              </div>

              <hr class="my-4">

              <dl class="row mb-0 result-details">
                <dt class="col-sm-4">Value used</dt>
                <dd class="col-sm-8" id="value-used">Not available</dd>
                <dt class="col-sm-4">Matched field</dt>
                <dd class="col-sm-8 mb-0" id="matched-field">Not available</dd>
              </dl>
            </section>
          </div>
        </section>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
